global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: enterprise_rag
    static_configs:
      - targets: ["api:9090"]
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
