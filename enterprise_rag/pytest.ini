[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    --no-header
markers =
    unit: Pure unit tests with no external dependencies
    integration: Tests that require running services
    security: Security layer tests
    slow: Tests that take more than 2 seconds
