# ═══════════════════════════════════════════════════════════════════════════════
# docker-compose.yml — LOCAL DEVELOPMENT ONLY
#
# Cloud services (Qdrant, Neo4j Aura, Supabase) are used in production.
# This file provides local equivalents for offline development.
#
# Production deployment → Render (see DEPLOYMENT.md)
# ═══════════════════════════════════════════════════════════════════════════════
version: "3.9"

services:

  # ── FastAPI app ───────────────────────────────────────────────────────────
  api:
    build: .
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      ENV: dev
      # Point to local Qdrant container in dev
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ""
      # Point to local Neo4j in dev
      NEO4J_URI: bolt://neo4j:7687
    depends_on:
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v2/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - ./logs:/app/logs

  # ── Qdrant (local dev replacement for Qdrant Cloud) ───────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Neo4j (local dev replacement for Neo4j Aura) ──────────────────────────
  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"   # Neo4j Browser
      - "7687:7687"   # Bolt
    environment:
      NEO4J_AUTH: neo4j/devpassword
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_pagecache_size: 256M
      NEO4J_dbms_memory_heap_max__size: 512M
    volumes:
      - neo4j_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  qdrant_data:
  neo4j_data:
